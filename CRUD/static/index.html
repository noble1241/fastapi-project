<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FastAPI Blog</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f7f9;
        color: #17202a;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(920px, 100%);
        display: grid;
        grid-template-columns: minmax(280px, 360px) 1fr;
        gap: 24px;
        align-items: start;
      }

      section {
        background: #ffffff;
        border: 1px solid #dce3ea;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(24, 39, 56, 0.08);
      }

      h1, h2 { margin: 0 0 16px; }
      h1 { font-size: 1.45rem; }
      h2 { font-size: 1.05rem; }

      label {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        font-size: 0.9rem;
        color: #364957;
      }

      input, textarea {
        width: 100%;
        border: 1px solid #bcc9d6;
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
      }

      textarea { min-height: 88px; resize: vertical; }

      button {
        border: 0;
        border-radius: 6px;
        background: #1967d2;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        padding: 10px 14px;
        cursor: pointer;
      }

      button.secondary { background: #eef2f7; color: #1f2d3a; }
      button.danger { background: #b42318; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }

      .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }

      .status { min-height: 22px; margin-top: 12px; font-size: 0.9rem; }
      .status.error { color: #b42318; }
      .status.success { color: #146c43; }

      .token {
        overflow-wrap: anywhere;
        font-size: 0.78rem;
        background: #f0f4f8;
        border-radius: 6px;
        padding: 10px;
        margin-top: 12px;
      }

      .blogs { display: grid; gap: 12px; margin-top: 16px; }

      article {
        border: 1px solid #dce3ea;
        border-radius: 8px;
        padding: 14px;
      }

      article h3 { margin: 0 0 6px; font-size: 1rem; }
      article p { margin: 0; line-height: 1.45; color: #405464; }

      .article-actions { display: flex; gap: 8px; margin-top: 10px; }
      .article-actions button { font-size: 0.82rem; padding: 6px 10px; }

      .edit-form { margin-top: 10px; display: grid; gap: 8px; }

      .tabs {
        display: flex;
        border-bottom: 2px solid #dce3ea;
        margin-bottom: 16px;
      }

      .tab {
        background: none;
        border: 0;
        border-radius: 0;
        color: #64788a;
        font-weight: 600;
        padding: 8px 16px;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
      }

      .tab.active { color: #1967d2; border-bottom-color: #1967d2; }

      @media (max-width: 760px) {
        main { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/static/js/App.js"></script>
  </body>
</html>
