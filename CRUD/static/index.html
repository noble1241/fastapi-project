<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FastAPI Blog Login</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f7f9;
        color: #17202a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(920px, 100%);
        display: grid;
        grid-template-columns: minmax(280px, 360px) 1fr;
        gap: 24px;
        align-items: start;
      }

      section {
        background: #ffffff;
        border: 1px solid #dce3ea;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(24, 39, 56, 0.08);
      }

      h1,
      h2 {
        margin: 0 0 16px;
      }

      h1 {
        font-size: 1.45rem;
      }

      h2 {
        font-size: 1.05rem;
      }

      label {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        font-size: 0.9rem;
        color: #364957;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid #bcc9d6;
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
      }

      textarea {
        min-height: 88px;
        resize: vertical;
      }

      button {
        border: 0;
        border-radius: 6px;
        background: #1967d2;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        padding: 10px 14px;
        cursor: pointer;
      }

      button.secondary {
        background: #eef2f7;
        color: #1f2d3a;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .status {
        min-height: 22px;
        margin-top: 12px;
        font-size: 0.9rem;
      }

      .status.error {
        color: #b42318;
      }

      .status.success {
        color: #146c43;
      }

      .token {
        overflow-wrap: anywhere;
        font-size: 0.78rem;
        background: #f0f4f8;
        border-radius: 6px;
        padding: 10px;
        margin-top: 12px;
      }

      .blogs {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      article {
        border: 1px solid #dce3ea;
        border-radius: 8px;
        padding: 14px;
      }

      article h3 {
        margin: 0 0 6px;
        font-size: 1rem;
      }

      article p {
        margin: 0;
        line-height: 1.45;
        color: #405464;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Login</h1>
        <form id="login-form">
          <label>
            Email
            <input id="email" autocomplete="username" required type="email" />
          </label>
          <label>
            Password
            <input id="password" autocomplete="current-password" required type="password" />
          </label>
          <div class="row">
            <button id="login-button" type="submit">Login</button>
            <button class="secondary" id="logout-button" type="button">Logout</button>
          </div>
        </form>
        <p class="status" id="login-status"></p>
        <p class="token hidden" id="token-display"></p>
      </section>

      <section>
        <h2>Protected Blogs</h2>
        <form id="blog-form">
          <label>
            Title
            <input id="blog-title" required />
          </label>
          <label>
            Body
            <textarea id="blog-body" required></textarea>
          </label>
          <div class="row">
            <button id="create-button" type="submit">Create Blog</button>
            <button class="secondary" id="refresh-button" type="button">Refresh Blogs</button>
          </div>
        </form>
        <p class="status" id="blog-status"></p>
        <div class="blogs" id="blogs"></div>
      </section>
    </main>

    <script>
      const tokenKey = "fastapi_blog_token";
      const loginForm = document.querySelector("#login-form");
      const blogForm = document.querySelector("#blog-form");
      const loginStatus = document.querySelector("#login-status");
      const blogStatus = document.querySelector("#blog-status");
      const tokenDisplay = document.querySelector("#token-display");
      const blogs = document.querySelector("#blogs");
      const loginButton = document.querySelector("#login-button");
      const createButton = document.querySelector("#create-button");

      let token = localStorage.getItem(tokenKey) || "";

      function setStatus(element, message, type = "") {
        element.textContent = message;
        element.className = `status ${type}`.trim();
      }

      function updateTokenDisplay() {
        tokenDisplay.textContent = token ? `Token: ${token}` : "";
        tokenDisplay.classList.toggle("hidden", !token);
      }

      async function request(path, options = {}) {
        const headers = new Headers(options.headers || {});
        if (token) {
          headers.set("Authorization", `Bearer ${token}`);
        }

        const response = await fetch(path, { ...options, headers });
        const contentType = response.headers.get("content-type") || "";
        const body = contentType.includes("application/json") ? await response.json() : null;

        if (!response.ok) {
          const message = body && body.detail ? body.detail : `Request failed with ${response.status}`;
          throw new Error(message);
        }

        return body;
      }

      async function loadBlogs() {
        if (!token) {
          blogs.innerHTML = "";
          setStatus(blogStatus, "Login first to load protected blogs.");
          return;
        }

        setStatus(blogStatus, "Loading blogs...");
        try {
          const data = await request("/blog/");
          blogs.innerHTML = data.length
            ? data
                .map(
                  (blog) => `
                    <article>
                      <h3>${escapeHtml(blog.title)}</h3>
                      <p>${escapeHtml(blog.body)}</p>
                    </article>
                  `
                )
                .join("")
            : "<p>No blogs yet.</p>";
          setStatus(blogStatus, "Blogs loaded.", "success");
        } catch (error) {
          setStatus(blogStatus, error.message, "error");
        }
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (character) => {
          const entities = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;",
          };
          return entities[character];
        });
      }

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        loginButton.disabled = true;
        setStatus(loginStatus, "Signing in...");

        const form = new URLSearchParams();
        form.set("username", document.querySelector("#email").value);
        form.set("password", document.querySelector("#password").value);

        try {
          const data = await request("/login", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: form,
          });
          token = data.access_token;
          localStorage.setItem(tokenKey, token);
          updateTokenDisplay();
          setStatus(loginStatus, "Logged in. Token saved for protected requests.", "success");
          await loadBlogs();
        } catch (error) {
          setStatus(loginStatus, error.message, "error");
        } finally {
          loginButton.disabled = false;
        }
      });

      blogForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        createButton.disabled = true;
        setStatus(blogStatus, "Creating blog...");

        try {
          await request("/blog/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              title: document.querySelector("#blog-title").value,
              body: document.querySelector("#blog-body").value,
            }),
          });
          blogForm.reset();
          setStatus(blogStatus, "Blog created.", "success");
          await loadBlogs();
        } catch (error) {
          setStatus(blogStatus, error.message, "error");
        } finally {
          createButton.disabled = false;
        }
      });

      document.querySelector("#refresh-button").addEventListener("click", loadBlogs);
      document.querySelector("#logout-button").addEventListener("click", () => {
        token = "";
        localStorage.removeItem(tokenKey);
        updateTokenDisplay();
        blogs.innerHTML = "";
        setStatus(loginStatus, "Logged out.", "success");
        setStatus(blogStatus, "Login first to load protected blogs.");
      });

      updateTokenDisplay();
      loadBlogs();
    </script>
  </body>
</html>
