<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FastAPI Blog Login</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f7f9;
        color: #17202a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(920px, 100%);
        display: grid;
        grid-template-columns: minmax(280px, 360px) 1fr;
        gap: 24px;
        align-items: start;
      }

      section {
        background: #ffffff;
        border: 1px solid #dce3ea;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(24, 39, 56, 0.08);
      }

      h1,
      h2 {
        margin: 0 0 16px;
      }

      h1 {
        font-size: 1.45rem;
      }

      h2 {
        font-size: 1.05rem;
      }

      label {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        font-size: 0.9rem;
        color: #364957;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid #bcc9d6;
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
      }

      textarea {
        min-height: 88px;
        resize: vertical;
      }

      button {
        border: 0;
        border-radius: 6px;
        background: #1967d2;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        padding: 10px 14px;
        cursor: pointer;
      }

      button.secondary {
        background: #eef2f7;
        color: #1f2d3a;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .status {
        min-height: 22px;
        margin-top: 12px;
        font-size: 0.9rem;
      }

      .status.error {
        color: #b42318;
      }

      .status.success {
        color: #146c43;
      }

      .token {
        overflow-wrap: anywhere;
        font-size: 0.78rem;
        background: #f0f4f8;
        border-radius: 6px;
        padding: 10px;
        margin-top: 12px;
      }

      .blogs {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      article {
        border: 1px solid #dce3ea;
        border-radius: 8px;
        padding: 14px;
      }

      article h3 {
        margin: 0 0 6px;
        font-size: 1rem;
      }

      article p {
        margin: 0;
        line-height: 1.45;
        color: #405464;
      }

      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script>
      const { useCallback, useEffect, useState } = React;
      const tokenKey = "fastapi_blog_token";

      function App() {
        const [email, setEmail] = useState("");
        const [password, setPassword] = useState("");
        const [token, setToken] = useState(() => localStorage.getItem(tokenKey) || "");
        const [loginStatus, setLoginStatus] = useState({ message: "", type: "" });
        const [blogStatus, setBlogStatus] = useState({ message: "", type: "" });
        const [blogs, setBlogs] = useState([]);
        const [title, setTitle] = useState("");
        const [body, setBody] = useState("");
        const [isLoggingIn, setIsLoggingIn] = useState(false);
        const [isCreating, setIsCreating] = useState(false);

        const apiRequest = useCallback(
          async (path, options = {}) => {
            const headers = new Headers(options.headers || {});
            if (token) {
              headers.set("Authorization", `Bearer ${token}`);
            }

            const response = await fetch(path, { ...options, headers });
            const contentType = response.headers.get("content-type") || "";
            const data = contentType.includes("application/json") ? await response.json() : null;

            if (!response.ok) {
              const detail = data && data.detail ? data.detail : `Request failed with ${response.status}`;
              throw new Error(detail);
            }

            return data;
          },
          [token]
        );

        const loadBlogs = useCallback(async () => {
          if (!token) {
            setBlogs([]);
            setBlogStatus({ message: "Login first to load protected blogs.", type: "" });
            return;
          }

          setBlogStatus({ message: "Loading blogs...", type: "" });
          try {
            const data = await apiRequest("/blog/");
            setBlogs(data);
            setBlogStatus({ message: "Blogs loaded.", type: "success" });
          } catch (error) {
            setBlogStatus({ message: error.message, type: "error" });
          }
        }, [apiRequest, token]);

        useEffect(() => {
          loadBlogs();
        }, [loadBlogs]);

        async function handleLogin(event) {
          event.preventDefault();
          setIsLoggingIn(true);
          setLoginStatus({ message: "Signing in...", type: "" });

          const form = new URLSearchParams();
          form.set("username", email);
          form.set("password", password);

          try {
            const data = await fetch("/login", {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body: form,
            }).then(async (response) => {
              const result = await response.json();
              if (!response.ok) {
                throw new Error(result.detail || `Request failed with ${response.status}`);
              }
              return result;
            });

            localStorage.setItem(tokenKey, data.access_token);
            setToken(data.access_token);
            setLoginStatus({ message: "Logged in. Token saved for protected requests.", type: "success" });
          } catch (error) {
            setLoginStatus({ message: error.message, type: "error" });
          } finally {
            setIsLoggingIn(false);
          }
        }

        async function handleCreateBlog(event) {
          event.preventDefault();
          setIsCreating(true);
          setBlogStatus({ message: "Creating blog...", type: "" });

          try {
            await apiRequest("/blog/", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ title, body }),
            });
            setTitle("");
            setBody("");
            setBlogStatus({ message: "Blog created.", type: "success" });
            await loadBlogs();
          } catch (error) {
            setBlogStatus({ message: error.message, type: "error" });
          } finally {
            setIsCreating(false);
          }
        }

        function handleLogout() {
          localStorage.removeItem(tokenKey);
          setToken("");
          setBlogs([]);
          setLoginStatus({ message: "Logged out.", type: "success" });
          setBlogStatus({ message: "Login first to load protected blogs.", type: "" });
        }

        return React.createElement(
          "main",
          null,
          React.createElement(
            "section",
            null,
            React.createElement("h1", null, "Login"),
            React.createElement(
              "form",
              { onSubmit: handleLogin },
              React.createElement(
                "label",
                null,
                "Email",
                React.createElement("input", {
                  autoComplete: "username",
                  onChange: (event) => setEmail(event.target.value),
                  required: true,
                  type: "email",
                  value: email,
                })
              ),
              React.createElement(
                "label",
                null,
                "Password",
                React.createElement("input", {
                  autoComplete: "current-password",
                  onChange: (event) => setPassword(event.target.value),
                  required: true,
                  type: "password",
                  value: password,
                })
              ),
              React.createElement(
                "div",
                { className: "row" },
                React.createElement("button", { disabled: isLoggingIn, type: "submit" }, "Login"),
                React.createElement("button", { className: "secondary", onClick: handleLogout, type: "button" }, "Logout")
              )
            ),
            React.createElement("p", { className: `status ${loginStatus.type}`.trim() }, loginStatus.message),
            token ? React.createElement("p", { className: "token" }, `Token: ${token}`) : null
          ),
          React.createElement(
            "section",
            null,
            React.createElement("h2", null, "Protected Blogs"),
            React.createElement(
              "form",
              { onSubmit: handleCreateBlog },
              React.createElement(
                "label",
                null,
                "Title",
                React.createElement("input", {
                  onChange: (event) => setTitle(event.target.value),
                  required: true,
                  value: title,
                })
              ),
              React.createElement(
                "label",
                null,
                "Body",
                React.createElement("textarea", {
                  onChange: (event) => setBody(event.target.value),
                  required: true,
                  value: body,
                })
              ),
              React.createElement(
                "div",
                { className: "row" },
                React.createElement("button", { disabled: isCreating, type: "submit" }, "Create Blog"),
                React.createElement(
                  "button",
                  { className: "secondary", onClick: loadBlogs, type: "button" },
                  "Refresh Blogs"
                )
              )
            ),
            React.createElement("p", { className: `status ${blogStatus.type}`.trim() }, blogStatus.message),
            React.createElement(
              "div",
              { className: "blogs" },
              blogs.length
                ? blogs.map((blog, index) =>
                    React.createElement(
                      "article",
                      { key: `${blog.title}-${index}` },
                      React.createElement("h3", null, blog.title),
                      React.createElement("p", null, blog.body)
                    )
                  )
                : React.createElement("p", null, token ? "No blogs yet." : "")
            )
          )
        );
      }

      ReactDOM.createRoot(document.querySelector("#root")).render(React.createElement(App));
    </script>
  </body>
</html>
